name: Refresh KBS Playlist

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় অটোমেটিক চলবে
  workflow_dispatch: # আপনি চাইলে ম্যানুয়ালি রান করতে পারবেন

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # এখানে ভুল ছিল, এখন ঠিক করা হয়েছে
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python kbs.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add kbsonair.m3u kbsonair.json
          git commit -m "Auto-update KBS playlist: $(date)" || exit 0
          git push
