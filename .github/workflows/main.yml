name: Refresh Toffee Live Channels

on:
  schedule:
    - cron: '0  * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
      
      - name: Run scraper
        run: python main.py
        continue-on-error: false
      
      - name: Show summary
        if: always()
        run: |
          echo "📊 Scraping Summary:"
          echo "=================="
          if [ -f toffee.json ]; then
            echo "✓ toffee.json created"
            echo "✓ toffee-ott-navigator.m3u created"
            echo "✓ toffee-nsplayer.m3u created"
            CHANNELS=$(python -c "import json; print(len(json.load(open('toffee.json'))['channels']))")
            echo "📺 Total channels: $CHANNELS"
          else
            echo "❌ No output files created"
          fi
      
      - name: Commit and push changes
        if: success()
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add toffee*.m3u toffee.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
