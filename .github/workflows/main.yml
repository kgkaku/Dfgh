name: Refresh Tamasha Playlist

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় চলবে
  workflow_dispatch: # ম্যানুয়ালি চালানোর অপশন

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write # গিটহাবে ফাইল পুশ করার পারমিশন
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tamashaweb.m3u tamashaweb.json
          git commit -m "Update playlist: $(date)" || echo "No changes to commit"
          git push
